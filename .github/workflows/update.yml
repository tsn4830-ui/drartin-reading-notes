name: update-radar

# 每天台灣時間早上 6 點抓一次（UTC 22:00），也可到 Actions 頁手動觸發。
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

# 允許：commit 回 DB / papers.json；部署 GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# 同一時間只跑一個，避免 commit 打架
concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch + score
        run: python fetch_and_score.py

      - name: Enrich (Unpaywall OA)
        run: python enrich.py --workers 8

      - name: Recheck 近 60 天太新當時抓不到的 OA
        run: python enrich.py --recheck 60 --workers 8 || true

      - name: Copy data into site
        run: cp papers.json site/papers.json

      - name: Commit DB + data (保留 first_seen 生命週期 → NEW 徽章)
        run: |
          git config user.name  "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add paper_radar.db site/papers.json
          git commit -m "radar: $(date -u +%F) update" || echo "no changes"
          git push || echo "push skipped"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
